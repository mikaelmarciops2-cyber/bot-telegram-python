<link rel="stylesheet" href="/static/style.css">

<header>
Sistema de Triagem Hospitalar
</header>

<div class="container">

<h2>Cadastro de Paciente</h2>

<form action="/data" method="POST">

Nome
<input type="text" name="nome">

Idade
<input type="number" name="idade">

Temperatura
<input type="number" name="temperatura">

Dor (0-10)
<input type="number" name="dor">

Sintomas
<textarea name="sintomas"></textarea>

<button type="submit">Classificar Paciente</button>

</form>

</div>
